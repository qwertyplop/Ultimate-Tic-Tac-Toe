kind = "web"
previewPath = "/"
title = "Tic Tac Toe Squared"
version = "1.0.0"
id = "artifacts/ttt-squared"
router = "path"

[[integratedSkills]]
name = "react-vite"
version = "1.0.0"

[[services]]
name = "web"
paths = [ "/" ]
localPort = 23407

[services.development]
run = "pnpm --filter @workspace/ttt-squared run dev"

[services.production]
build = [ "pnpm", "--filter", "@workspace/ttt-squared", "run", "build" ]
publicDir = "artifacts/ttt-squared/dist/public"
serve = "static"

[[services.production.rewrites]]
from = "/*"
to = "/index.html"

[services.env]
PORT = "23407"
BASE_PATH = "/"
